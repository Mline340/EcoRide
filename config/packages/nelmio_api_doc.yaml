nelmio_api_doc:
  documentation:
    info:
      title: EcoRide API
      description: Documentation de l'API EcoRide
      version: "1.0.0"
    components:
            securitySchemes:
                bearerAuth:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
    security:
         - bearerAuth: []

  areas:
    default:
      path_patterns:
        - '^/api(?!/doc$)'
